name: Docker Build Check

# Validates that the image still builds on pull requests. Publishing happens in
# release-please.yml when a release is cut. amd64-only here for speed -- this is
# a compile/Dockerfile sanity check, not a release.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
