<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" fill="#0066cc" rx="15"/>

  <!-- Go gopher simplified -->
  <ellipse cx="50" cy="45" rx="25" ry="22" fill="#76d7ea"/>

  <!-- Eyes -->
  <circle cx="42" cy="42" r="3" fill="#000"/>
  <circle cx="58" cy="42" r="3" fill="#000"/>

  <!-- Nose -->
  <ellipse cx="50" cy="48" rx="2" ry="1.5" fill="#000"/>

  <!-- Ears -->
  <ellipse cx="32" cy="38" rx="6" ry="8" fill="#76d7ea"/>
  <ellipse cx="68" cy="38" rx="6" ry="8" fill="#76d7ea"/>

  <!-- Body -->
  <ellipse cx="50" cy="72" rx="20" ry="18" fill="#76d7ea"/>

  <!-- Code brackets -->
  <text x="50" y="90" font-family="monospace" font-size="16" fill="#fff" text-anchor="middle" font-weight="bold">&lt;/&gt;</text>
</svg>
