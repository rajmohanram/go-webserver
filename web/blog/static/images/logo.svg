<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="#ffffff" stroke="#0066cc" stroke-width="3"/>

  <!-- Go Gopher-inspired design -->
  <!-- Head -->
  <ellipse cx="100" cy="90" rx="50" ry="45" fill="#76d7ea"/>

  <!-- Eyes -->
  <circle cx="85" cy="85" r="8" fill="#ffffff"/>
  <circle cx="115" cy="85" r="8" fill="#ffffff"/>
  <circle cx="87" cy="85" r="4" fill="#000000"/>
  <circle cx="117" cy="85" r="4" fill="#000000"/>

  <!-- Nose -->
  <ellipse cx="100" cy="100" rx="6" ry="4" fill="#000000"/>

  <!-- Mouth -->
  <path d="M 90 105 Q 100 112 110 105" stroke="#000000" stroke-width="2" fill="none"/>

  <!-- Ears -->
  <ellipse cx="65" cy="75" rx="15" ry="20" fill="#76d7ea"/>
  <ellipse cx="135" cy="75" rx="15" ry="20" fill="#76d7ea"/>

  <!-- Body -->
  <ellipse cx="100" cy="145" rx="40" ry="35" fill="#76d7ea"/>

  <!-- Arms -->
  <ellipse cx="65" cy="145" rx="12" ry="30" fill="#76d7ea" transform="rotate(-20 65 145)"/>
  <ellipse cx="135" cy="145" rx="12" ry="30" fill="#76d7ea" transform="rotate(20 135 145)"/>

  <!-- Code Symbol -->
  <text x="100" y="175" font-family="monospace" font-size="20" fill="#0066cc" text-anchor="middle" font-weight="bold">&lt;/&gt;</text>

  <!-- Decorative elements -->
  <circle cx="30" cy="30" r="3" fill="#0066cc" opacity="0.5"/>
  <circle cx="170" cy="30" r="3" fill="#0066cc" opacity="0.5"/>
  <circle cx="30" cy="170" r="3" fill="#0066cc" opacity="0.5"/>
  <circle cx="170" cy="170" r="3" fill="#0066cc" opacity="0.5"/>
</svg>
